services:
  - type: web
    name: cortex-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: USE_RQ
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      # To connect to production Firebase, add FIREBASE_CREDENTIALS containing the JSON string

  - type: web
    name: cortex-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cortex-backend
          envVarKey: RENDER_EXTERNAL_URL
