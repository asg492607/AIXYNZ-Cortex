services:
  - type: web
    name: cortex-platform
    env: python
    rootDir: .
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.x"
      - key: USE_RQ
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      # To connect to production Firebase, add FIREBASE_CREDENTIALS containing the JSON string
